<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="KIPASGTS adalah seorang modder game Stumble Guys yang dikenal juga dengan nama Haikal atau Ekal. Lihat portofolio mod game dan modifikasi yang telah dibuatnya di sini.">
    <meta name="keywords" content="KIPASGTS, Haikal, Ekal, Stumble Guys, mod game, modding game, portofolio modifikasi game">
    <meta name="robots" content="index, follow">
    <meta name="author" content="KIPASGTS">
    <title>KIPASGTS | KipasGuys</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e0f7fa;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-theme {
            background-color: #263238;
            color: #eceff1;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .portfolio-box {
            background-color: #ffffff;
            border: 2px solid #00796b;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
            max-width: 500px;
            text-align: center;
            color: #4e4e4e;
            position: relative;
        }

        .portfolio-box.dark {
            background-color: #37474f;
            border: 2px solid #80cbc4;
            color: #eceff1;
        }

        .portfolio-box:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .text-section {
            margin-bottom: 20px;
        }

        .text-section h1 {
            margin: 0;
            font-size: 2.5em;
            color: #00796b;
            animation: shineAnimation 2s infinite;
        }

        .portfolio-box.dark .text-section h1 {
            color: #eceff1;
        }

        .text-section p {
            font-size: 1.2em;
            margin: 10px 0 0;
        }

        .image-section {
            margin-top: 20px;
            position: relative;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .image-section img {
            max-width: 100%;
            border-radius: 50%;
            border: 3px solid #00796b;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .image-section img.rotate {
            animation: rotateImage 2s linear infinite;
        }

        .image-section .small-image {
            width: 100px;
            height: 100px;
        }

        @keyframes rotateImage {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes shineAnimation {
            0% {
                text-shadow: 0 0 5px rgba(0, 121, 107, 0.7);
            }
            50% {
                text-shadow: 0 0 10px rgba(128, 203, 196, 0.9);
            }
            100% {
                text-shadow: 0 0 5px rgba(0, 121, 107, 0.7);
            }
        }

        .theme-toggle {
            margin-top: 20px;
            display: flex;
            align-items: center;
        }

        .theme-toggle input {
            display: none;
        }

        .slider {
            position: relative;
            width: 60px;
            height: 30px;
            background-color: #00796b;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .slider::before {
            content: "";
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background-color: #ffffff;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        input:checked + .slider {
            background-color: #80cbc4;
        }

        input:checked + .slider::before {
            transform: translateX(30px);
        }

        @media (max-width: 600px) {
            .text-section h1 {
                font-size: 2em;
            }

            .text-section p {
                font-size: 1em;
            }

            .portfolio-box {
                padding: 15px;
            }

            .image-section {
                flex-direction: column;
                gap: 10px;
            }

            .image-section .small-image {
                width: 70px;
                height: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="portfolio-box">
            <div class="text-section">
                <h1>KIPASGTS</h1>
                <p>KIPASGTS adalah seorang modder game Stumble Guys yang dikenal juga dengan nama Haikal atau Ekal. Ia menciptakan berbagai modifikasi yang membuat permainan menjadi lebih menarik dan seru.</p>
            </div>
            <div class="image-section">
                <img id="mainImage" src="https://yt3.googleusercontent.com/dpi__e_FSUQECtHFEGADKSeOO_5sjvGnVzYfhtORYlLO4XtHj0whu6OdO1X2lgmIePqDxD9mkQA=s160-c-k-c0x00ffffff-no-rj" alt="KIPASGTS Haikal Ekal" onclick="toggleAudio('main')">
                <img id="secondImage" class="small-image" src="https://kipasgts.github.io/assets/img/harleyda.jpg" alt="Harley Da" onclick="toggleAudio('second')">
                <audio id="mainAudio" src="https://github.com/KIPASGTS/kipasgts.github.io/raw/main/assets/music/gemuruhriuh.mp3"></audio>
                <audio id="secondAudio" src="https://example.com/second-audio.mp3"></audio>
            </div>
            <div class="theme-toggle">
                <input type="checkbox" id="theme-switch" onclick="toggleTheme()">
                <label for="theme-switch" class="slider"></label>
            </div>
        </div>
    </div>
    <script>
        let isPlaying = false;
        let currentAudio = null;

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            document.querySelectorAll('.portfolio-box').forEach(box => {
                box.classList.toggle('dark');
            });
        }

        function toggleAudio(image) {
            const mainAudio = document.getElementById('mainAudio');
            const secondAudio = document.getElementById('secondAudio');
            const mainImage = document.getElementById('mainImage');
            const secondImage = document.getElementById('secondImage');

            if (image === 'main') {
                if (currentAudio === mainAudio && !mainAudio.paused) {
                    mainAudio.pause();
                    mainImage.classList.remove('rotate');
                    currentAudio = null;
                    isPlaying = false;
                    return;
                }
                currentAudio = mainAudio;
                mainImage.classList.add('rotate');
                secondImage.classList.remove('rotate');
                secondAudio.pause();
            } else {
                if (currentAudio === secondAudio && !secondAudio.paused) {
                    secondAudio.pause();
                    secondImage.classList.remove('rotate');
                    currentAudio = null;
                    isPlaying = false;
                    return;
                }
                currentAudio = secondAudio;
                secondImage.classList.add('rotate');
                mainImage.classList.remove('rotate');
                mainAudio.pause();
            }

            currentAudio.play();
            isPlaying = true;

            currentAudio.addEventListener('ended', () => {
                mainImage.classList.remove('rotate');
                secondImage.classList.remove('rotate');
                isPlaying = false;
                currentAudio = null;
            });
        }
    </script>
</body>
</html>
